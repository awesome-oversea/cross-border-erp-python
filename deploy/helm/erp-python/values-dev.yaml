replicaCount: 1

image:
  tag: "0.1.0-dev"

env:
  ENVIRONMENT: "development"
  DEBUG: "true"
  DB_HOST: "localhost"
  DB_PORT: "5432"
  DB_NAME: "erp_dev"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "3"
  REDIS_HOST: "localhost"
  REDIS_PORT: "6379"
  LOG_LEVEL: "DEBUG"
  JSON_LOGS: "false"
  CORS_ORIGINS: '["http://localhost:3000"]'

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false

ingress:
  enabled: false
