apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: erp
  namespace: argocd
spec:
  description: ERP Platform Project
  sourceRepos:
    - https://github.com/example/erp-python.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: erp
    - server: https://kubernetes.default.svc
      namespace: erp-monitoring
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: "apps"
      kind: "*"
    - group: "networking.k8s.io"
      kind: "*"
    - group: "autoscaling"
      kind: "*"
    - group: "batch"
      kind: "*"
    - group: "policy"
      kind: PodDisruptionBudget
  roles:
    - name: admin
      description: Admin access to ERP project
      policies:
        - p, proj:erp:admin, applications, *, erp/*, allow
        - p, proj:erp:admin, repositories, *, erp/*, allow
