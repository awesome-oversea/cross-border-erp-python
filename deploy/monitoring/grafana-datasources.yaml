apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: PostgreSQL
    type: postgres
    url: postgresql:5432
    database: erp
    user: erp
    secureJsonData:
      password: CHANGE_ME
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400

  - name: Redis
    type: redis-datasource
    url: redis://redis:6379

---
apiVersion: 1

dashboards:
  - name: ERP Application
    folder: ERP
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/erp
      foldersFromFilesStructure: true
