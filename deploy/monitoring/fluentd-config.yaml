apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: erp
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/containers/erp-python-*.log
      pos_file /var/log/fluentd-erp-python.pos
      tag kubernetes.erp-python
      read_from_head true
      <parse>
        @type json
        time_key timestamp
        time_format %Y-%m-%dT%H:%M:%S.%NZ
        keep_time_key true
      </parse>
    </source>

    <filter kubernetes.erp-python>
      @type parser
      key_name log
      reserve_data true
      <parse>
        @type json
        time_key timestamp
        time_format %Y-%m-%dT%H:%M:%S.%NZ
      </parse>
    </filter>

    <filter kubernetes.**>
      @type kubernetes_metadata
      @id filter_kube_metadata
      skip_labels false
      skip_container_metadata false
      skip_master_url true
    </filter>

    <match kubernetes.erp-python>
      @type elasticsearch
      host elasticsearch-master
      port 9200
      scheme http
      logstash_format true
      logstash_prefix erp-logs
      logstash_dateformat %Y.%m.%d
      include_tag_key true
      tag_key @log_name
      reconnect_on_error true
      reload_on_failure true
      reload_connections false
      request_timeout 30s
      <buffer>
        @type file
        path /var/log/fluentd-buffers/erp-python
        flush_mode interval
        flush_interval 5s
        flush_thread_count 2
        retry_type exponential_backoff
        retry_forever true
        retry_max_interval 30
        chunk_limit_size 2M
        queue_limit_length 8
        overflow_action block
      </buffer>
    </match>

    <match **>
      @type elasticsearch
      host elasticsearch-master
      port 9200
      scheme http
      logstash_format true
      logstash_prefix fluent-logs
      logstash_dateformat %Y.%m.%d
      <buffer>
        @type file
        path /var/log/fluentd-buffers/default
        flush_mode interval
        flush_interval 10s
      </buffer>
    </match>
